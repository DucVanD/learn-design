<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Galaxy Alpha</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        mainBg: '#050505',
                        brand: '#2563eb',
                        cyan: { 400: '#22d3ee', 500: '#06b6d4' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #ffffff; height: 200vh; /* height ảo để test cuộn */ }
    </style>
</head>
<body class="antialiased">

    <!-- ==========================================
         HEADER GALAXY ALPHA
    =========================================== -->
    <!-- Dùng bg-mainBg/85 (#050505 với 85% opacity) và backdrop-blur-xl để tạo hiệu ứng kính mờ chuẩn Apple/Glassmorphism -->
    <nav class="fixed top-0 left-0 right-0 z-50 border-b border-white/5 bg-mainBg/85 backdrop-blur-xl transition-all duration-300">
        <!-- Đặt chiều cao cố định h-[70px] để đồng bộ với các phần content đã làm trước đó -->
        <div class="w-full max-w-[1440px] mx-auto px-4 lg:px-8 2xl:px-16 h-[70px] flex items-center justify-between gap-6">
            
            <!-- 1. CỤM LOGO TRÁI -->
            <a href="#" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
                <!-- Chữ G dạ quang -->
                <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-cyan-400 to-violet-500 text-white font-black flex items-center justify-center text-lg shadow-[0_0_15px_rgba(6,182,212,0.4)]">
                    G
                </div>
                <div class="flex flex-col justify-center">
                    <h1 class="text-xl font-bold tracking-wide uppercase text-white leading-none">Galaxy Alpha</h1>
                    <!-- Slogan nhỏ bên dưới -->
                    <p class="hidden sm:block text-[9px] font-bold uppercase tracking-[0.2em] text-white/40 mt-1">Market Academy</p>
                </div>
            </a>

            <!-- 2. MENU GIỮA (Chỉ hiện trên PC/Tablet) -->
            <!-- Sửa lỗi text-AC[11px] thành text-[11px] -->
            <div class="hidden md:flex items-center gap-8 text-[11px] font-bold uppercase tracking-widest text-white/50">
                <!-- Thêm class text-cyan-400 cho trang đang Active -->
                <a href="#" class="text-cyan-400 transition-colors">Thị trường & Tin tức</a>
                <a href="#" class="hover:text-cyan-400 transition-colors">Khóa Học</a>
                <a href="#" class="hover:text-cyan-400 transition-colors">Tuyển Dụng</a>
                <a href="#" class="hover:text-cyan-400 transition-colors">Về chúng tôi</a>
            </div>

            <!-- 3. CỤM NÚT ACTION (ĐĂNG NHẬP / ĐĂNG KÝ) -->
            <div class="flex items-center gap-4">
                <!-- Nút Đăng nhập dạng Text ẩn trên màn hình quá nhỏ -->
                <a href="#" class="hidden sm:inline-flex text-[11px] font-bold uppercase tracking-widest text-white/50 hover:text-white transition-colors">
                    Đăng nhập
                </a>
                
                <!-- Nút Đăng ký (Primary CTA) -->
                <a href="#" class="h-10 inline-flex items-center justify-center rounded-lg bg-white px-5 text-[11px] font-bold uppercase tracking-widest text-black hover:bg-cyan-400 hover:shadow-[0_0_20px_rgba(34,211,238,0.4)] transition-all duration-300">
                    Đăng ký
                </a>

                <!-- Nút Menu Hamburger cho Mobile (Thường ẩn trên PC) -->
                <button class="md:hidden text-white/60 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
            </div>

        </div>
    </nav>

    <!-- Đoạn div trống này chỉ để đẩy nội dung xuống dưới Header (vì Header dùng fixed) -->
    <div class="pt-[70px]">
        <div class="p-8 text-white/40">Cuộn chuột để test hiệu ứng kính mờ của thanh Header...</div>
    </div>

</body>
</html>
