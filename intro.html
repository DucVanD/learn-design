<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sông Sài Gòn, con sông thành phố tôi</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/intro.css" />
  </head>
  <body>
    <div class="intro">
      <div class="background"></div>

      <div class="content">
        <div class="ggmap shadow">
          <img src="intro/map_songsaigon.jpg" alt="" class="img-fluid" />

          <div class="chevron">
            <div class="chevron-up">
              <i class="fa-solid fa-chevron-up"></i>
            </div>
            <div class="chevron-down">
              <i class="fa-solid fa-chevron-down text-center"></i>
            </div>
          </div>
        </div>

        <div class="logos py-3">
          <div class="row container w-100 h-100">
            <div class="col-md-4 logo">
              <img
                src="intro/ten du an.png"
                alt=""
                style="width: 150px; height: auto"
              />
            </div>
            <div class="col-md-2 logo">
              <img
                src="intro/UBND_TP_HCM.png"
                alt=""
                style="width: 60px; height: auto"
              />
            </div>
            <div class="col-md-3 logo">
              <img
                src="intro/thanh doan tphcm.png"
                alt=""
                style="width: 150px; height: auto"
              />
            </div>
            <div class="col-md-3 logo">
              <img
                src="intro/FPT_Polytechnic.png"
                alt=""
                style="width: 150px; height: auto"
              />
            </div>
          </div>
        </div>

        <div class="location">
          <i class="fa fa-location-dot fs-3" aria-hidden="true"></i>
      
        </div>

      </div>

      <div class="">
        <div class="text1 text-uppercase h-100 d-flex align-items-center " >
          <p>Sông sài gòn</p>
        </div>

        <div class="text2 text-uppercase h-100 align-items-center d-flex">
          <p class="text-center">con sông của thành<br />phố tôi</p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/intro.js"></script>
  </body>
</html>
