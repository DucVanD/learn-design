<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Intro — Sông Sài Gòn</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  :root{
    /* chỉnh 2 biến này nếu muốn di chuyển vùng bản đồ (để "zoom" vào Cầu Bình Triệu) */
    --map-pos-x: 48%; /* ví dụ: 48% ngang */
    --map-pos-y: 42%; /* ví dụ: 42% dọc */
  }

  html,body{height:100%; margin:0; background:#000; font-family: Inter, system-ui, Arial;}

  /* Stage: giữ tỷ lệ 16:9 và nằm giữa viewport */
  .stage {
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .stage-16x9 {
    /* giữ đúng tỉ lệ 16:9, co dãn vừa đủ trong viewport */
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));
    position: relative;
    overflow: hidden;
  }

  /* background toàn màn (blur 5px) */
  .intro-bg{
    position:absolute; inset:0;
    background: url('intro/map_songsaigon.jpg') center/cover no-repeat;
    filter: blur(5px);
    transform: scale(1.05); /* phóng 1 chút để tránh viền sáng do blur */
    z-index:0;
  }

  /* overlay màu */
  .intro-overlay{
    position:absolute; inset:0;
    background: rgba(1,55,71,0.85);
    z-index:1;
  }

  /* --- CHỮ DỌC 2 BÊN --- */
  .side-text {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    writing-mode: vertical-rl; /* chữ dọc */
    text-orientation: upright;
    font-weight: 800;
    font-size: 34px;
    letter-spacing: 6px;
    line-height: 0.9;
    /* tạo chữ lõm (outline) giống mẫu */
    color: transparent;
    -webkit-text-stroke: 2px rgba(255,255,255,0.9);
    text-stroke: 2px rgba(255,255,255,0.9);
    text-shadow:
      0 1px 0 rgba(0,0,0,0.45),
      0 2px 6px rgba(0,0,0,0.35);
    z-index: 2; /* trên overlay, dưới khung giữa (khung giữa z-index:3) */
    opacity: 0.95;
    pointer-events: none; /* tránh ảnh hưởng hover/click */
  }
  .side-text.left { left: 28px; }
  .side-text.right { right: 28px; /* nếu muốn chữ quay chiều ngược lại: transform: translateY(-50%) rotate(180deg); */ }

  /* Khung giữa (nền trắng) */
  .center-frame{
    position: relative;
    z-index: 3; /* đặt cao hơn side-text để khung trắng che phần vượt vào giữa */
    width: min(800px, calc(100% - 40px)); /* nếu màn nhỏ thì co lại */
    height: min(600px, calc(100% - 40px));
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Bên trong khung: phần bản đồ (80%) và phần logo (20%) */
  .map-area{
    /* chiếm 80% chiều cao khung giữa */
    height: 80%;
    width: 100%;
    padding: 12px; /* khoảng cách trong */
    box-sizing: border-box;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* hộp bản đồ thực sự (có shadow như mẫu) */
  .map-box{
    width: calc(100% - 24px);
    height: 100%;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(11,30,40,0.45);
    background-image: url('intro/map_songsaigon.jpg');
    background-size: cover;
    /* vị trí mặc định tập trung gần "Cầu Bình Triệu" — chỉnh --map-pos-x / --map-pos-y nếu cần */
    background-position: var(--map-pos-x) var(--map-pos-y);
    background-repeat: no-repeat;
    position: relative;
  }

  /* phần logo (20%) */
  .logos-bar{
    height: 20%;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-around; /* cách đều 4 logo */
    padding: 8px 20px;
    box-sizing: border-box;
    gap: 12px;
    background: transparent;
  }

  .logos-bar img{ height: auto; display:block; object-fit: contain; }

  .logo--circle{ width: 60px; height: auto; border-radius: 50%; }
  .logo--big{ width: 150px; height: auto; }

  /* responsive: nếu stage nhỏ hơn khung giữa, scale khung giữa vừa vặn */
  @media (max-width: 880px), (max-height: 700px){
    .center-frame{
      transform: scale(calc(min( (100% - 40px)/800, (100% - 40px)/600 )));
      transform-origin: center;
    }
    .side-text { font-size: 24px; left: 12px; right: 12px; -webkit-text-stroke: 1.6px; }
  }

  /* optional: chữ tiêu đề trong khung (nếu bạn cần) */
  .frame-title{
    position:absolute; top:12px; left:20px; font-weight:700; color:#0b2b36; font-size:18px; z-index:4;
  }

</style>
</head>
<body>

<div class="stage">
  <div class="stage-16x9">
    <!-- Background blur + overlay -->
    <div class="intro-bg" aria-hidden="true"></div>
    <div class="intro-overlay" aria-hidden="true"></div>

    <!-- CHỮ DỌC 2 BÊN -->
    <div class="side-text left">SÔNG SÀI GÒN</div>
    <div class="side-text right">CON SÔNG CỦA THÀNH PHỐ TÔI</div>

    <!-- Khung giữa -->
    <div class="center-frame mx-auto">
      <!-- nếu muốn tiêu đề trong frame -->
      <div class="frame-title">HỘI THI "HỌC SINH, SINH VIÊN GIỎI NGHỀ" NĂM 2024 — Trang 4/11</div>

      <!-- Map (80%) -->
      <div class="map-area">
        <div class="map-box" id="mapBox" title="Bản đồ — mặc định tập trung Cầu Bình Triệu">
          <!-- bạn có thể thêm marker hoặc overlay ở đây nếu cần -->
        </div>
      </div>

      <!-- Logos (20%) -->
      <div class="logos-bar">
        <!-- Thay các src bên dưới bằng đường dẫn logo thật -->
        <img src="intro/logo1.png" alt="logo tròn" class="logo--circle">
        <img src="intro/logo2.png" alt="logo 2" class="logo--big">
        <img src="intro/logo3.png" alt="logo 3" class="logo--big">
        <img src="intro/logo4.png" alt="logo 4" class="logo--big">
      </div>
    </div>
  </div>
</div>

<!-- Tùy chọn: script nhỏ để chỉnh vị trí nền map nhanh -->

  // Nếu bạn muốn điều chỉnh vị trí nền (để chính xác "Cầu Bình Triệu"),

  // VD: x=48, y=42 (mặc định). Thay đổi và refresh để quan sát.

  })();
</script>

</body>
</html>
